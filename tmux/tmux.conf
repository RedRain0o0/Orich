## Binds
unbind C-b
set -g prefix `
bind ` send-prefix
set -g mouse on

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

unbind '"'
unbind %
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
# Pane renaming sourced from u/funnyFrank https://www.reddit.com/r/tmux/comments/1qy4rm1/comment/o42abs4/
bind '"' command-prompt -p "Pane name:" "select-pane -T '%%'"

## Options
set -g status-position top
set -g status-interval 1

set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 0

set -g set-clipboard on
setw -g mode-keys vi

set-option -g status "on"

set-option -g set-titles on
set-option -g set-titles-string "#T"
set-option -g automatic-rename on

set -g pane-border-status top
set -g pane-border-format "┤ #P #T ├"

set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

## Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @plugin 'omerxx/tmux-sessionx'
#set -g @plugin 'omerxx/tmux-session-manager'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
# Be sure to install https://github.com/arl/gitmux

set -g @resurrect-capture-pane-contents 'on'
#set -g @sessionx-bind 'o'
#set -g @sessionx-prompt " "

## Customization

BG=#666666 #255
HIGHLIGHT=#FF999B
set-option -g status-style bg=default,fg=default


# Default window with an activity alert
set-window-option -g window-status-activity-style bg=colour237,fg=colour248

# Active window title colors
set-window-option -g window-status-current-style bg=default,fg=colour237 # fg=bg1

set-option -g pane-active-border-style fg="$HIGHLIGHT"
set-option -g pane-border-style fg=colour239

# Message info
set-option -g message-style bg=default,fg=colour235 # bg=bg2, fg=fg1

# Writing commands inactive
set-option -g message-command-style bg=colour239,fg=colour223 # bg=fg3, fg=bg1

# Pane number display
set-option -g display-panes-active-colour colour1 #fg2
set-option -g display-panes-colour colour237 #bg1


# Bell
set-window-option -g window-status-bell-style bg="$HIGHLIGHT",fg=colour235

set-option -g status-left "\
#[fg=colour255, bg=colour240]#{?client_prefix,#[bg="$HIGHLIGHT"],}  \
#[fg=colour240, bg=colour253]#{?client_prefix,#[fg="$HIGHLIGHT"],}\
#[fg=colour235, bg=colour253] #S \
#[fg=colour253, bg=default] "
set -g status-left-length 100

set -g status-right '#(gitmux -cfg $HOME/.gitmux.conf "#{pane_current_path}")'

set-option -g status-right "\
#(echo '')\
#[fg=colour253, bg=default]\
#[fg=colour235, bg=colour253]#(gitmux -cfg $HOME/.gitmux.conf '#{pane_current_path}')\
#[fg=colour235, bg=colour253]%b %d %y\
#[fg="$HIGHLIGHT"] \
#[fg=colour255, bg="$HIGHLIGHT"]%a %H:%M "

set-option -g status-justify centre

set-window-option -g window-status-current-format "\
#[fg="$HIGHLIGHT", bg=default]\
#[fg=colour255, bg="$HIGHLIGHT"]#I\
#[fg="$HIGHLIGHT", bg=colour255]\
#[fg=colour235, bg=colour255, bold]#{?window_zoomed_flag,  ,} #W \
#[fg=colour255, bg=default]"

set-window-option -g window-status-format "\
#[fg=colour240,bg=default,noitalics]\
#[fg=colour255, bg=colour240]#I\
#[fg=colour240, bg=colour253]\
#[fg=color236, bg=colour253] #W \
#[fg=colour253, bg=default]"

# Set the history limit so we get lots of scrollback.
setw -g history-limit 50000000


# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R







run '~/.tmux/plugins/tpm/tpm'
